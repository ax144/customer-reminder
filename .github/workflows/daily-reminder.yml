name: Daily Customer Reminder

on:
  repository_dispatch:
    types:
      - morning_reminder
      - afternoon_reminder
  
  schedule:
    # 上午推送：北京时间 8:00, 8:30, 9:00, 9:30
    - cron: '0 0 * * *'
    - cron: '30 0 * * *'
    - cron: '0 1 * * *'
    - cron: '30 1 * * *'
    # 下午推送：北京时间 16:00, 16:30, 17:00, 17:30
    - cron: '0 8 * * *'
    - cron: '30 8 * * *'
    - cron: '0 9 * * *'
    - cron: '30 9 * * *'
  
  workflow_dispatch:
    inputs:
      mode:
        description: '推送模式：morning（上午）、afternoon（下午）'
        required: true
        default: 'morning'
        type: choice
        options:
          - morning
          - afternoon

jobs:
  push-reminder:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Determine push mode
      id: mode
      run: |
        if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
          if [ "${{ github.event.action }}" = "morning_reminder" ]; then
            echo "mode=morning" >> $GITHUB_OUTPUT
          else
            echo "mode=afternoon" >> $GITHUB_OUTPUT
          fi
        elif [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
          echo "mode=${{ github.event.inputs.mode }}" >> $GITHUB_OUTPUT
        elif [ "${{ github.event.schedule }}" = "0 0 * * *" ] || [ "${{ github.event.schedule }}" = "30 0 * * *" ] || [ "${{ github.event.schedule }}" = "0 1 * * *" ] || [ "${{ github.event.schedule }}" = "30 1 * * *" ]; then
          echo "mode=morning" >> $GITHUB_OUTPUT
        else
          echo "mode=afternoon" >> $GITHUB_OUTPUT
        fi
    
    - name: Run reminder
      env:
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
        PUSH_MODE: ${{ steps.mode.outputs.mode }}
      run: |
        python scripts/push_reminder.py
