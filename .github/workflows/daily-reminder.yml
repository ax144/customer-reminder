name: Daily Customer Reminder

on:
  schedule:
    # 早上8:45推送 (北京时间8:45，考虑GitHub延迟，提前到UTC 22:00=北京时间6:00)
    # GitHub Actions通常延迟1-2小时，实际执行时间约北京时间8:00-9:00
    - cron: '0 22 * * *'
    # 下午16:45推送 (北京时间16:45，考虑GitHub延迟，提前到UTC 6:45=北京时间14:45)
    # 实际执行时间约北京时间16:00-17:00
    - cron: '45 6 * * *'
  workflow_dispatch:  # 支持手动触发
    inputs:
      mode:
        description: '推送模式：morning（上午）、afternoon（下午）'
        required: true
        default: 'morning'
        type: choice
        options:
          - morning
          - afternoon

jobs:
  push-reminder:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Run morning reminder
      if: github.event.schedule == '0 22 * * *'
      env:
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
        PUSH_MODE: morning
      run: |
        python scripts/push_reminder.py
    
    - name: Run afternoon reminder
      if: github.event.schedule == '45 6 * * *'
      env:
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
        PUSH_MODE: afternoon
      run: |
        python scripts/push_reminder.py
    
    - name: Run manual reminder
      if: github.event_name == 'workflow_dispatch'
      env:
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
        PUSH_MODE: ${{ github.event.inputs.mode }}
      run: |
        python scripts/push_reminder.py
