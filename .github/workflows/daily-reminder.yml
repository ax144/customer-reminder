name: Daily Customer Reminder

on:
  repository_dispatch:
    types: [morning_reminder, afternoon_reminder, meeting_visit_morning, meeting_visit_afternoon]
  
  schedule:
    - cron: '0 0 * * *'
    - cron: '30 0 * * *'
    - cron: '0 1 * * *'
    - cron: '30 8 * * *'
    - cron: '0 9 * * *'
    - cron: '30 9 * * *'
    - cron: '0 22 * * *'
  
  workflow_dispatch:
    inputs:
      mode:
        type: choice
        options: [morning, afternoon, meeting_visit_morning, meeting_visit_afternoon]
        default: 'morning'

jobs:
  push-reminder:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    - run: pip install -r requirements.txt
    - id: mode
      run: |
        if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
          echo "mode=${{ github.event.inputs.mode }}" >> $GITHUB_OUTPUT
        elif [ "${{ github.event.schedule }}" = "0 22 * * *" ]; then
          echo "mode=meeting_visit_morning" >> $GITHUB_OUTPUT
        elif [ "${{ github.event.schedule }}" = "0 0 * * *" ] || [ "${{ github.event.schedule }}" = "30 0 * * *" ] || [ "${{ github.event.schedule }}" = "0 1 * * *" ]; then
          echo "mode=morning" >> $GITHUB_OUTPUT
        else
          echo "mode=meeting_visit_afternoon" >> $GITHUB_OUTPUT
        fi
    - run: python scripts/push_reminder.py
      env:
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
        PUSH_MODE: ${{ steps.mode.outputs.mode }}
