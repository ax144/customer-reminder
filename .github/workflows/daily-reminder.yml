name: Daily Customer Reminder

on:
  # 支持外部触发
  repository_dispatch:
    types:
      - morning_reminder
      - afternoon_reminder
      - meeting_visit_morning
      - meeting_visit_afternoon
  
  # GitHub 定时任务
  schedule:
    # ============ 客户关怀 ============
    # 早上：北京时间 8:00, 8:30, 9:00
    - cron: '0 0 * * *'    # 北京时间 8:00
    - cron: '30 0 * * *'   # 北京时间 8:30
    - cron: '0 1 * * *'    # 北京时间 9:00
    
    # 下午：北京时间 16:30, 17:00, 17:30
    - cron: '30 8 * * *'   # 北京时间 16:30
    - cron: '0 9 * * *'    # 北京时间 17:00
    - cron: '30 9 * * *'   # 北京时间 17:30
    
    # ============ 约见/外访 ============
    # 早上 6:00（北京时间 6:00 = UTC 22:00 前一天）
    - cron: '0 22 * * *'   # 北京时间 6:00
  
  # 支持手动触发
  workflow_dispatch:
    inputs:
      mode:
        description: '推送模式'
        required: true
        default: 'morning'
        type: choice
        options:
          - morning
          - afternoon
          - meeting_visit_morning
          - meeting_visit_afternoon

jobs:
  push-reminder:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Determine push mode
      id: mode
      run: |
        if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
          echo "mode=${{ github.event.action }}" >> $GITHUB_OUTPUT
        elif [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
          echo "mode=${{ github.event.inputs.mode }}" >> $GITHUB_OUTPUT
        elif [ "${{ github.event.schedule }}" = "0 0 * * *" ] || [ "${{ github.event.schedule }}" = "30 0 * * *" ] || [ "${{ github.event.schedule }}" = "0 1 * * *" ]; then
          echo "mode=morning" >> $GITHUB_OUTPUT
        elif [ "${{ github.event.schedule }}" = "0 22 * * *" ]; then
          echo "mode=meeting_visit_morning" >> $GITHUB_OUTPUT
        else
          echo "mode=meeting_visit_afternoon" >> $GITHUB_OUTPUT
        fi
    
    - name: Run reminder
      env:
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
        PUSH_MODE: ${{ steps.mode.outputs.mode }}
      run: |
        python scripts/push_reminder.py
