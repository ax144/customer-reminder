name: Daily Customer Reminder

on:
  schedule:
    # 上午推送 (目标北京时间8:45，设置UTC 0:00=北京时间8:00)
    # GitHub延迟约0-2小时，实际执行时间约北京时间8:00-10:00
    - cron: '0 0 * * *'
    # 下午推送 (目标北京时间17:00，设置UTC 9:00=北京时间17:00)
    # GitHub延迟约0-2小时，实际执行时间约北京时间17:00-19:00
    - cron: '0 9 * * *'
  workflow_dispatch:  # 支持手动触发
    inputs:
      mode:
        description: '推送模式：morning（上午）、afternoon（下午）'
        required: true
        default: 'morning'
        type: choice
        options:
          - morning
          - afternoon

jobs:
  push-reminder:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Run morning reminder
      if: github.event.schedule == '0 0 * * *'
      env:
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
        PUSH_MODE: morning
      run: |
        python scripts/push_reminder.py
    
    - name: Run afternoon reminder
      if: github.event.schedule == '0 9 * * *'
      env:
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
        PUSH_MODE: afternoon
      run: |
        python scripts/push_reminder.py
    
    - name: Run manual reminder
      if: github.event_name == 'workflow_dispatch'
      env:
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
        PUSH_MODE: ${{ github.event.inputs.mode }}
      run: |
        python scripts/push_reminder.py
